basePath: /
definitions:
  categoryctrl.CreateCategoryRequest:
    properties:
      name:
        type: string
      owner_id:
        type: integer
    required:
    - name
    - owner_id
    type: object
  categoryctrl.UpdateCategoryRequest:
    properties:
      name:
        type: string
    required:
    - name
    type: object
  helper.PaginatedWebResponse:
    properties:
      code:
        type: integer
      data: {}
      page:
        type: integer
      page_size:
        type: integer
      status:
        type: string
      total:
        type: integer
    type: object
  helper.WebResponse:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
      status:
        type: string
    type: object
  itemctrl.CreateItemRequest:
    properties:
      category_id:
        type: integer
      condition:
        type: string
      name:
        type: string
      owner_id:
        type: integer
      serial_no:
        type: string
      status:
        type: string
    required:
    - category_id
    - name
    - owner_id
    type: object
  itemctrl.UpdateItemRequest:
    properties:
      condition:
        type: string
      name:
        type: string
      status:
        type: string
    required:
    - condition
    - name
    - status
    type: object
  loanctrl.CreateLoanRequest:
    properties:
      borrower_id:
        type: integer
      item_id:
        type: integer
    required:
    - borrower_id
    - item_id
    type: object
  loanctrl.ItemSummaryResponse:
    properties:
      id:
        type: integer
      name:
        type: string
    type: object
  loanctrl.LoanResponse:
    properties:
      borrowed_at:
        type: string
      borrower:
        $ref: '#/definitions/loanctrl.UserSummaryResponse'
      id:
        type: integer
      item:
        $ref: '#/definitions/loanctrl.ItemSummaryResponse'
      returned_at:
        type: string
      status:
        type: string
    type: object
  loanctrl.UpdateLoanRequest:
    properties:
      returned_at:
        type: string
    type: object
  loanctrl.UserSummaryResponse:
    properties:
      email:
        type: string
      id:
        type: integer
      name:
        type: string
    type: object
  model.Category:
    properties:
      created_at:
        type: string
      id:
        type: integer
      name:
        type: string
      owner_id:
        type: integer
      updated_at:
        type: string
      user:
        $ref: '#/definitions/model.User'
    type: object
  model.Item:
    properties:
      category:
        $ref: '#/definitions/model.Category'
      category_id:
        type: integer
      condition:
        type: string
      created_at:
        type: string
      id:
        type: integer
      name:
        type: string
      owner:
        $ref: '#/definitions/model.User'
      owner_id:
        type: integer
      serial_no:
        type: string
      status:
        type: string
      updated_at:
        type: string
    type: object
  model.User:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: integer
      name:
        type: string
      updated_at:
        type: string
    type: object
  userctrl.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  userctrl.LoginResponse:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/model.User'
    type: object
  userctrl.RegisterRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        minLength: 6
        type: string
    required:
    - email
    - name
    - password
    type: object
  userctrl.UpdateUserRequest:
    properties:
      email:
        type: string
      name:
        type: string
    required:
    - email
    - name
    type: object
host: localhost:8000
info:
  contact: {}
  description: REST API untuk sistem peminjaman barang P2P
  title: Loans Item API
  version: "1.0"
paths:
  /api/categories:
    get:
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 10
        description: Page size
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/helper.PaginatedWebResponse'
      security:
      - BearerAuth: []
      summary: Get all categories
      tags:
      - categories
    post:
      consumes:
